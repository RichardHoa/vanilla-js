<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      main {
        background-color: var(--background-surface);
        line-height: 1.6;
        text-align: center;
        padding: 20px;
      }

      header {
        background-color: var(--primaryColor);
        padding: 30px;
      }

      section {
        background: var(--highlight);
        padding: 20px;
        margin: 20px auto;
        width: 80%;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h1,
      h2 {
        margin-bottom: 10px;
      }

      p {
        margin-bottom: 15px;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      ul li {
        background: var(--secondaryColor);
        margin: 5px 0;
        padding: 10px;
        border-radius: 5px;
      }

      blockquote {
        font-style: italic;
        background: var(--secondaryColor);
        padding: 15px;
        border-left: 5px solid var(--primaryColor);
        margin: 10px auto;
        width: 60%;
      }

      form {
        display: flex;
        flex-direction: column;
        width: 60%;
        margin: auto;
      }

      label {
        text-align: left;
        margin: 10px 0 5px;
      }

      input:not([type="color"]),
      textarea {
        border: 1px solid var(--secondaryColor);
        border-radius: 5px;
        padding: 5px;
      }

      textarea {
        height: 100px;
      }

      /* button {
        background-color: var(--primaryColor);
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        margin-top: 10px;
        cursor: pointer;
        transition: linear 0.25s;
      }

      button:hover {
        background-color: var(--secondaryColor);
      }

      button:disabled {
        background-color: var(--disabled);
        cursor: not-allowed;
        transition: linear 0.5s;
      } */
    </style>
    <script type="module" src="/src/Pages/secondPage/secondPage.js"></script>
  </head>
  <body>
    <header>
      <h1>This is a controlled form</h1>
      <p>We use proxy to achieve this control form</p>
    </header>

    <section>
      <h2>Get in Touch</h2>
      <form>
        <label for="name">Your Name</label>
        <input
          type="text"
          id="name"
          name="name"
          autocomplete="off"
          autofocus
          pattern="[a-zA-Z]{3,10}"
        />
        <label for="email">Your Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="off"
          multiple
        />

        <label for="browsersInput">Choose a film:</label>
        <input list="browsers" id="browsersInput" name="browsers" />
        <datalist id="browsers">
          <option value="Film 1"></option>
          <option value="Film 2"></option>
          <option value="Film 3"></option>
          <option value="Film 4"></option>
          <option value="Film 5"></option>
          <option value="Film 6"></option>
          <option value="Film 7"></option>
          <option value="Film 8"></option>
          <option value="Film 9"></option>
        </datalist>

        <label for="birthday">Birthday:</label>
        <input type="date" id="birthday" name="birthday" max="2007-01-01" />
        <label for="birthdaytime">Birthday (date and time):</label>
        <input type="datetime-local" id="birthdaytime" name="birthdaytime" />

        <label for="color">Select your favorite color:</label>
        <input type="color" id="color" name="color" />

        <input type="hidden" id="custId" name="custId" value="3487" />

        <label for="message">Your Message</label>
        <textarea id="message" name="message" autocomplete="off"></textarea>

        <label for="bdayMonth">Birthday (month and year):</label>
        <input type="month" id="bdayMonth" name="bdayMonth" />

        <label for="quantity">Quantity (between 1 and 5):</label>
        <input
          type="number"
          id="quantity"
          name="quantity"
          min="0"
          max="500"
          step="10"
        />

        <label for="vol">Volume (between 0 and 50):</label>
        <input type="range" id="vol" name="vol" min="0" max="100" value="50" />

        <!-- <button type="submit" >Send Message</button> -->
        <submit-button>Submit right now</submit-button>
      </form>
    </section>
  </body>
</html>
